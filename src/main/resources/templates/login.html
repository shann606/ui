<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .login-box {
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px #ccc;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #1976d2;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #125ea7;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="login-box">

    <h2>Login</h2>

    <form th:action="@{/authenticate}" method="post">

        <input
                type="text"
                name="username"
                placeholder="Username"
                required />

        <input
                type="password"
                name="password"
                placeholder="Password"
                required />

        <button type="submit">
            Sign In
        </button>

    </form>

</div>

</body>
</html>
