<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
 <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-box">

    <h2>Login</h2>

    <form th:action="@{/dashboard}" method="get">

        <input
                type="text"
                name="username"
                placeholder="Username"
                required />

        <input
                type="password"
                name="password"
                placeholder="Password"
                required />

        <button type="submit">
            Sign In
        </button>

    </form>
    
     <div class="register-link">
            <p>New user?
                <a th:href="@{/register}">Create an account</a>
            </p>
        </div>

</div>

</body>
</html>
